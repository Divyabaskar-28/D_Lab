<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - D Lab</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #0f2027, #203a43);
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 40px 30px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            color: #fff;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        input::placeholder {
            color: #ccc;
        }

        input:focus {
            border: 1px solid #00f2fe;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        .signup-link {
            margin-top: 20px;
            font-size: 14px;
        }

        .signup-link a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
        }
.logo {
    margin-bottom: 25px;
    display: flex;
    justify-content: center;
}

.logo img {
    width: 95px;              /* Perfect balanced size */
    height: 95px;
    object-fit: contain;
    border-radius: 50%;
    padding: 10px;
    background: rgba(255, 255, 255, 0.04);
    box-shadow: 
        0 0 15px rgba(0, 242, 254, 0.4),
        0 0 35px rgba(0, 242, 254, 0.2);
    transition: 0.3s ease;
}

.logo img:hover {
    transform: scale(1.05);
    box-shadow: 
        0 0 25px rgba(0, 242, 254, 0.6),
        0 0 50px rgba(0, 242, 254, 0.4);
}</style>
</head>

<body>

<div class="container">
    <div class="card">
        <div class="logo">
    <img src="{{ url_for('static', filename='aiRat_1.webp') }}" alt="D Lab Logo">
</div>
        <h2>Welcome Back To AI Rat </h2>

        <form method="POST">
            <div class="input-group">
                <input type="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-group">
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="signup-link">
            Don’t have an account?
            <a href="/signup">Create Account</a>
        </div>
    </div>
</div>

</body>
</html>
