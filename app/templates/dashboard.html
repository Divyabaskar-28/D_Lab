<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D Lab Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #000000, #0f2027, #203a43);
            color: #fff;
        }

        
 .navbar {
    height: 70px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    overflow: hidden; /* Important */
}

.logo {
    height: 100%;
    display: flex;
    align-items: center;
}

.logo img {
    max-height: 90px;  /* Control max size */
    width: auto;
    object-fit: contain;
}

        .logout {
            text-decoration: none;
            color: #00f2fe;
            font-weight: 500;
        }

        .logout:hover {
            text-decoration: underline;
        }

        .container {
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        .welcome {
            margin-bottom: 30px;
        }

        .welcome h2 {
            font-weight: 500;
            margin-bottom: 10px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.15);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.4);
        }

        .card h3 {
            margin-bottom: 15px;
            font-weight: 500;
        }

        .card button {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">
    <img src="{{ url_for('static', filename='aiRat_1.webp') }}" alt="D Lab AI Logo"><b>Rat AI</b>
</div>
        <a href="/logout" class="logout">Logout</a>
    </div>

    <div class="container">
        <div class="welcome">
            <h2>Welcome to D Lab 🚀</h2>
            <p>Logged in as: {{ email }}</p>
        </div>

        <div class="card-grid">
            <div class="card">
                <h3>Subtitle to Voice</h3>
                <p>Convert subtitles into AI-powered voice output instantly.</p>
                <br>
                <a href="/subtitle-to-voice">
                    <button>Open Tool</button>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
